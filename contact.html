<main class="container">
  <section class="contact-page">

    <div class="contact-left">
      <h1 class="contact-title">CONTACT SAMIRA</h1>

      <div class="contact-info">
        <p>Bay Area, California</p>
      </div>

      <form class="contact-form" action="https://formsubmit.co/sbakhtiary01@gmail.com" method="POST">
        
        <!-- hidden settings for FormSubmit -->
        <input type="hidden" name="_subject" value="New message from Sourbroughhh website">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <div class="field">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" autocomplete="name" required>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button class="btn" type="submit">Send Message</button>
      </form>
    </div>

    <div class="contact-right">
      <div class="contact-image">
        <img src="images/she_is_maskin.jpg" alt="Artwork detail">
      </div>
    </div>

  </section>
